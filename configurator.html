<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="Избери категория и персонализирай своя продукт онлайн — ключодържатели, ароматизатори, стикери. SAVOV PRO Ltd." />
  <link rel="canonical" href="https://savovpro.com/configurator.html" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="bg_BG" />
  <meta property="og:url" content="https://savovpro.com/configurator.html" />
  <meta property="og:title" content="SAVOV PRO — Персонализирай" />
  <meta property="og:description" content="Избери категория и персонализирай своя продукт онлайн — ключодържатели, ароматизатори, стикери. SAVOV PRO Ltd." />
  <meta property="og:image" content="https://savovpro.com/assets/products/20260111_161704-2.jpg" />
  <meta property="og:site_name" content="SAVOV PRO Ltd." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SAVOV PRO — Персонализирай" />
  <meta name="twitter:description" content="Избери категория и персонализирай своя продукт онлайн — ключодържатели, ароматизатори, стикери. SAVOV PRO Ltd." />
  <meta name="twitter:image" content="https://savovpro.com/assets/products/20260111_161704-2.jpg" />
  <title>SAVOV PRO — Персонализирай</title>
  <link rel="icon" href="assets/logo/logo-mark.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/logo/logo-mark.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="assets/css/configurator.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-backdrop" aria-hidden="true"></div>
    <div class="container header-inner cfg-header-inner">
      <a class="logo-link" href="index.html" aria-label="SAVOV PRO Ltd. — начало">
        <img
          class="logo-svg"
          src="assets/logo/logo-full.svg"
          width="140"
          height="40"
          alt="SAVOV PRO"
          loading="eager"
          decoding="async"
        />
      </a>
      <span class="cfg-header-title">Персонализирай</span>
      <a class="cfg-header-back" href="index.html">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span class="cfg-header-back-label">Назад към сайта</span>
      </a>
    </div>
  </header>

  <div class="cfg-wrap">
    <section class="section">
      <div class="container">
        <h1 class="section-heading" style="text-align:center;">Избери продукт</h1>
        <p class="cfg-hub-intro">Избери категория и конфигурирай текста, символите или логото си директно в прегледа.</p>
        <div class="cfg-hub-grid" id="cfg-hub-grid" aria-label="Категории конфигуратор"></div>
      </div>
    </section>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <img
        class="footer-logo"
        src="assets/logo/logo-signature.svg"
        width="339"
        height="98"
        alt="SAVOV PRO"
        loading="lazy"
        decoding="async"
      />
      <p class="footer-tagline" lang="en">Made specially for you.</p>
      <p class="footer-copy">© <span id="year"></span> SAVOV PRO Ltd. Всички права запазени.</p>
    </div>
  </footer>

  <script src="assets/js/configurator/categories.js"></script>
  <script>
  (function () {
    'use strict';
    var yEl = document.getElementById('year');
    if (yEl) yEl.textContent = String(new Date().getFullYear());

    var grid = document.getElementById('cfg-hub-grid');
    if (!grid || !window.CONFIGURATOR_CATEGORIES) return;

    CONFIGURATOR_CATEGORIES.forEach(function (cat) {
      var url = window.getConfiguratorUrl(cat);
      var card = document.createElement(url ? 'a' : 'div');
      card.className = 'cfg-hub-card' + (cat.comingSoon ? ' is-soon' : '');
      if (url) card.href = url;

      card.innerHTML =
        '<div class="cfg-hub-card__img"><img src="' + cat.image + '" alt="" loading="lazy" decoding="async" /></div>' +
        '<span class="cfg-hub-card__title">' + cat.title + '</span>' +
        '<span class="cfg-hub-card__desc">' + cat.description + '</span>' +
        (cat.comingSoon ? '<span class="cfg-hub-card__badge">Скоро</span>' : '');

      grid.appendChild(card);
    });
  })();
  </script>
</body>
</html>
